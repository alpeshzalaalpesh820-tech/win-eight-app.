<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win-Eight | Beginner Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #facc15; --red: #ef4444; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .luxury-card { background: linear-gradient(145deg, #0f0f0f, #141414); border: 1px solid #222; border-radius: 24px; }
        .gold-btn { background: linear-gradient(135deg, #b48b1d, #facc15, #b48b1d); color: #000; font-weight: 900; border-radius: 12px; transition: 0.3s; }
        .gold-btn:active { transform: scale(0.95); }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .num-slot { height: 60px; background: #1a1a1a; border: 1px solid #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .selected { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); background: #222; }
        .loser-slot { background: rgba(239, 68, 68, 0.1) !important; border-color: var(--red) !important; color: var(--red) !important; position: relative; }
        .loser-slot::after { content: '✕'; position: absolute; font-size: 20px; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen p-4">
        
        <div class="flex justify-between items-center mb-6 px-2">
            <div>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Level 1: Beginner</p>
                <h2 class="text-2xl font-black text-yellow-500 italic">ARENA G2</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-zinc-500 uppercase">Wallet</p>
                <h2 id="wallet-bal" class="text-xl font-bold text-green-500">₹2.00</h2>
            </div>
        </div>

        <div class="luxury-card p-6 mb-6">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">Choose Your Lucky Number</span>
                <span class="text-[10px] bg-red-600/20 text-red-500 px-2 py-1 rounded">10 Players Joined</span>
            </div>

            <div id="grid" class="num-grid mb-10">
                </div>

            <div class="flex items-center justify-around mb-8 bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <button onclick="changeBet(-5)" class="text-2xl text-zinc-600 font-bold w-10 h-10 border border-zinc-700 rounded-full">-</button>
                <div class="text-center">
                    <p class="text-[9px] text-zinc-500 uppercase mb-1">Bet Amount</p>
                    <h3 id="bet-display" class="text-3xl font-black text-white">₹10</h3>
                </div>
                <button onclick="changeBet(5)" class="text-2xl text-zinc-600 font-bold w-10 h-10 border border-zinc-700 rounded-full">+</button>
            </div>

            <button id="play-btn" onclick="startSpin()" class="gold-btn w-full py-5 text-lg shadow-lg shadow-yellow-500/10">Confirm & Spin</button>
        </div>

        <div class="luxury-card p-4 border-zinc-800/50">
            <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-zinc-500">
                <span>Winner Payout: <span class="text-green-500" id="payout-text">₹12.00</span></span>
                <span>Odds: 80% (G2)</span>
            </div>
        </div>

    </div>

    <div id="win-modal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6 hidden">
        <div class="luxury-card w-full p-10 text-center border-green-500 border-2 scale-in">
            <h2 class="text-5xl font-black text-green-500 mb-2 italic">WINNER!</h2>
            <p class="text-zinc-400 text-xs mb-8 uppercase tracking-widest">Aapka number safe raha</p>
            <h3 id="win-amt" class="text-3xl font-bold text-white mb-10">+₹12.00</h3>
            <button onclick="location.reload()" class="gold-btn w-full py-4 rounded-xl">Play Next Round</button>
        </div>
    </div>

    <script>
        let currentBet = 10;
        let selectedNum = null;
        let wallet = 2.00;

        // Initialize Grid
        const grid = document.getElementById('grid');
        for(let i=1; i<=10; i++) {
            let slot = document.createElement('div');
            slot.className = 'num-slot';
            slot.innerText = i;
            slot.onclick = () => selectNumber(i, slot);
            grid.appendChild(slot);
        }

        function selectNumber(num, el) {
            document.querySelectorAll('.num-slot').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            selectedNum = num;
        }

        function changeBet(val) {
            currentBet = Math.max(4, Math.min(50, currentBet + val));
            document.getElementById('bet-display').innerText = '₹' + currentBet;
            
            // Payout Logic as per your sheet
            // G2: ₹10 bet -> ₹12 payout | ₹50 bet -> ₹60 payout
            let payout = currentBet * 1.2; 
            document.getElementById('payout-text').innerText = '₹' + payout.toFixed(2);
        }

        function startSpin() {
            if(!selectedNum) return alert("Pehle ek number chunein!");
            
            const btn = document.getElementById('play-btn');
            btn.disabled = true;
            btn.innerText = "Spinning...";

            // Game Logic: 80% Winning Chance (8 winners, 2 losers)
            setTimeout(() => {
                let slots = document.querySelectorAll('.num-slot');
                let loser1 = Math.floor(Math.random() * 10);
                let loser2 = (loser1 + 3) % 10; // 2 losers logic

                slots[loser1].classList.add('loser-slot');
                slots[loser2].classList.add('loser-slot');

                setTimeout(() => {
                    if(selectedNum !== (loser1+1) && selectedNum !== (loser2+1)) {
                        // Winner
                        let finalWin = currentBet * 1.2;
                        document.getElementById('win-amt').innerText = '+₹' + finalWin.toFixed(2);
                        document.getElementById('win-modal').classList.remove('hidden');
                    } else {
                        alert("Oops! Aapka number bahar ho gaya. Fir se koshish karein.");
                        location.reload();
                    }
                }, 1500);
            }, 2000);
        }
    </script>
</body>
</html>
