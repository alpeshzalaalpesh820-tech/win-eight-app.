<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win-Eight Luxury Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #facc15; --red: #ef4444; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Premium Background Effect */
        .luxury-bg {
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            min-height: 100vh;
        }

        /* Glassmorphism Card */
        .luxury-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(250, 204, 21, 0.2);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
        }

        /* Golden Button */
        .gold-btn {
            background: linear-gradient(135deg, #b48b1d, #facc15, #b48b1d);
            background-size: 200% auto;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            border-radius: 15px;
        }
        .gold-btn:active { transform: scale(0.96); opacity: 0.9; }
        .gold-btn:hover { background-position: right center; }

        /* Input Styling */
        .premium-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #222;
            border-radius: 12px;
            color: white;
            transition: 0.3s;
        }
        .premium-input:focus {
            border-color: var(--gold);
            background: rgba(250, 204, 21, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }

        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="luxury-bg flex items-center justify-center p-6">
        <div class="max-w-md w-full luxury-card p-10 fade-in">
            
            <div class="text-center mb-12">
                <h1 class="text-6xl font-black italic text-red-600 tracking-tighter mb-2">WIN-EIGHT</h1>
                <p class="text-[10px] tracking-[5px] text-gray-500 uppercase">Elite Gaming Arena</p>
            </div>

            <div id="login-step-1">
                <div class="mb-8">
                    <label class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest block mb-4">Mobile Verification</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold">+91</span>
                        <input type="number" id="phone" placeholder="Enter Mobile Number" 
                               class="premium-input w-full py-4 pl-14 pr-4 text-xl tracking-widest">
                    </div>
                </div>

                <button onclick="requestOTP()" class="gold-btn w-full py-5 mb-6">Get OTP</button>
                
                <div class="flex items-center justify-center gap-2 text-green-500 font-bold mb-4">
                    <span class="text-lg">💰</span>
                    <span class="text-[11px] uppercase">₹2 Instant Welcome Bonus</span>
                </div>
            </div>

            <div id="login-step-2" class="hidden">
                <div class="mb-8">
                    <label class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest block mb-4">Enter 4-Digit OTP</label>
                    <div class="flex justify-between gap-3">
                        <input type="number" class="premium-input w-14 h-14 text-center text-2xl font-bold otp-field">
                        <input type="number" class="premium-input w-14 h-14 text-center text-2xl font-bold otp-field">
                        <input type="number" class="premium-input w-14 h-14 text-center text-2xl font-bold otp-field">
                        <input type="number" class="premium-input w-14 h-14 text-center text-2xl font-bold otp-field">
                    </div>
                </div>

                <button onclick="verifyAndEnter()" class="gold-btn w-full py-5 mb-6">Verify & Login</button>
                <p class="text-center text-xs text-gray-600 uppercase tracking-widest cursor-pointer hover:text-white" onclick="location.reload()">Resend OTP</p>
            </div>

            <p class="text-center text-[9px] text-gray-700 uppercase tracking-[3px] mt-8">
                Secure 256-bit Encrypted Access
            </p>
        </div>
    </div>

    <script>
        function requestOTP() {
            const phone = document.getElementById('phone').value;
            if(phone.length < 10) {
                alert("Please enter a valid 10-digit number");
                return;
            }
            
            // UI Switch to OTP
            document.getElementById('login-step-1').classList.add('hidden');
            document.getElementById('login-step-2').classList.remove('hidden');
            document.getElementById('login-step-2').classList.add('fade-in');
        }

        function verifyAndEnter() {
            // Yahan se aapka game dashboard khulega
            alert("Verification Successful! ₹2 Bonus Added.");
            window.location.href = "#"; // Replace with your game link
        }
    </script>
</body>
</html>
