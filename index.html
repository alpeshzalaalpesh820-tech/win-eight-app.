<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win-Eight | Premium Gaming</title>
    <style>
        body { background-color: #0d0d0d; color: #d4af37; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 20px; border: 2px solid #d4af37; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: #fff; letter-spacing: 3px; margin-bottom: 5px; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .tagline { color: #888; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #333; background: #262626; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #d4af37; box-shadow: 0 0 5px #d4af37; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #d4af37, #f9e29b); border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .bonus-tag { background: rgba(0, 255, 0, 0.1); color: #00ff00; padding: 8px; border-radius: 8px; font-size: 13px; margin-top: 20px; border: 1px dashed #00ff00; }
        .footer-info { margin-top: 25px; font-size: 11px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>WIN-EIGHT</h1>
        <div class="tagline">The Ultimate Number Game</div>
        <input type="number" id="phone" placeholder="Mobile Number">
        <input type="password" id="pin" placeholder="Enter PIN">
        <button class="btn" onclick="checkLogin()">START WINNING</button>
        <div class="bonus-tag">💰 ₹2 Instant Bonus on Login</div>
        <div class="footer-info">SECURE • PRIVATE • TRUSTED</div>
    </div>

    <script>
        function checkLogin() {
            const phone = document.getElementById('phone').value;
            if(phone.length === 10) {
                alert("Account Verified! Connecting to Win-Eight Servers...");
                // Next step mein Dashboard ka code connect karenge
            } else {
                alert("Please enter a valid 10-digit mobile number.");
            }
        }
    </script>
</body>
</html>
