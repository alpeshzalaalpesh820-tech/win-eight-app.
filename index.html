<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win-Eight Official Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #facc15; --red: #ef4444; --green: #22c55e; --bg: #0d0d0d; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        
        /* Utility Classes */
        .luxury-card { background: #141414; border: 1px solid #262626; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .gold-btn { background: var(--gold); color: #000; font-weight: 800; border-radius: 12px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .gold-btn:active { transform: scale(0.98); opacity: 0.8; }
        
        /* Number Grid Styles */
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .num-slot { height: 65px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; position: relative; cursor: pointer; transition: 0.2s; }
        
        /* State Classes */
        .selected { border: 2px solid var(--gold) !important; box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .selected::after { content: 'MERA'; position: absolute; bottom: 5px; font-size: 8px; color: var(--gold); font-weight: 900; }
        .rad-x { background: rgba(239, 68, 68, 0.1) !important; border-color: var(--red) !important; color: transparent !important; animation: shake 0.3s; }
        .rad-x::before { content: '✕'; position: absolute; font-size: 28px; color: var(--red); font-weight: 100; }
        
        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Screens */
        .screen { min-h-screen p-4 flex flex-col items-center; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen fade-in">
